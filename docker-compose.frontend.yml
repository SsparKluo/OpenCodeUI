# ============================================
# OpenCode WebUI - 纯前端本地构建部署
# ============================================
# 只构建并启动前端 UI，不依赖后端 opencode serve。
# 适用于纯 UI 开发调试、设计预览、或接入自定义后端。
#
# 使用方法：
#   docker compose -f docker-compose.frontend.yml up -d --build
#
# 环境变量：
#   FRONTEND_PORT  - 前端监听端口（默认 3000）

services:
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    image: opencodeui-frontend:local
    container_name: opencodeui-frontend
    restart: unless-stopped
    ports:
      - '127.0.0.1:${FRONTEND_PORT:-3000}:3000'
